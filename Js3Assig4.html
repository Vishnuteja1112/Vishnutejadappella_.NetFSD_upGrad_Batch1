<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker</title>
</head>
<body>

<h2>Mini Expense Tracker</h2>

Title:
<input type="text" id="title"><br><br>

Amount:
<input type="number" id="amount"><br><br>

Date:
<input type="date" id="date"><br><br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>

<h3>Expenses</h3>
<ul id="list"></ul>

<script>
  let db;

  let request = indexedDB.open("ExpenseDB", 1);

  request.onupgradeneeded = function (e) {
    db = e.target.result;
    db.createObjectStore("expenses", { keyPath: "id", autoIncrement: true });
  };

  request.onsuccess = function (e) {
    db = e.target.result;
  };

  function addExpense() {
    let tx = db.transaction("expenses", "readwrite");
    let store = tx.objectStore("expenses");

    let expense = {
      title: document.getElementById("title").value,
      amount: document.getElementById("amount").value,
      date: document.getElementById("date").value
    };

    store.add(expense);

    alert("Expense Added");
  }

  function viewExpenses() {
    let tx = db.transaction("expenses", "readonly");
    let store = tx.objectStore("expenses");
    let request = store.getAll();

    request.onsuccess = function () {
      let list = document.getElementById("list");
      list.innerHTML = "";

      request.result.forEach(exp => {
        let li = document.createElement("li");
        li.textContent = `${exp.title} - ₹${exp.amount} (${exp.date})`;
        list.appendChild(li);
      });
    };
  }
</script>

</body>
</html>
