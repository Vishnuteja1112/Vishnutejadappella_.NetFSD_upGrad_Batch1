<!DOCTYPE html>
<html>
<head>
    <title>Lab 3 - Event Handling</title>

    <!-- jQuery Library -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body { font-family: Arial; padding: 20px; }
        img { width: 150px; margin: 10px 0; }
    </style>
</head>

<body>

<h2>Lab 3 — Event Handling</h2>

<!-- 1. Button Click -->
<button id="alertBtn">Click Me</button>

<br><br>

<!-- 2. Image Hover -->
<img id="myImage" src="https://via.placeholder.com/150">

<br>

<!-- 3. Double Click Paragraph -->
<p id="para">Double-click me to hide</p>

<!-- 4. Input Blur -->
<input type="text" id="nameInput" placeholder="Type something then click outside">

<br><br>

<!-- 5. Form Submission -->
<form id="myForm">
    <input type="text" placeholder="Enter something" required>
    <button type="submit">Submit</button>
</form>

<!-- jQuery Code -->
<script>

$(document).ready(function () {

    // 1. Alert on button click
    $("#alertBtn").click(function () {
        alert("Button clicked!");
    });

    // 2. Change image on hover
    $("#myImage").hover(
        function () {
            $(this).attr("src", "https://via.placeholder.com/150/ff0000");
        },
        function () {
            $(this).attr("src", "https://via.placeholder.com/150");
        }
    );

    // 3. Double click to hide paragraph
    $("#para").dblclick(function () {
        $(this).hide();
    });

    // 4. Show message when input loses focus
    $("#nameInput").blur(function () {
        alert("Input lost focus!");
    });

    // 5. Prevent form submission
    $("#myForm").submit(function (event) {
        event.preventDefault();
        alert("Form submission prevented!");
    });

});

</script>

</body>
</html>
