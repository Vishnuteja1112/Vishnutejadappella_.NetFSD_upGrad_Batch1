<!DOCTYPE html>
<html>
<head>
<title>Student Profile Manager</title>

<style>
#profile {
  border: 2px solid #333;
  padding: 15px;
  width: 250px;
  background: #f4f4f4;
}
</style>

</head>

<body>

<h2>Student Profile</h2>

<div id="profile"></div>

<br>

<button id="loadBtn">Load Profile</button>
<button id="updateMarksBtn">Update Marks</button>

<script>

// Global student object
let student = {
  name: "Amit",
  rollNo: 101,
  marks: 85
};

function updateStudentProfile(studentObj) {

  document.getElementById("profile").innerHTML =
    "<b>Name:</b> " + studentObj.name + "<br>" +
    "<b>Roll No:</b> " + studentObj.rollNo + "<br>" +
    "<b>Marks:</b> " + studentObj.marks;
}

function updateMarks(newMarks) {

  student.marks = newMarks;

  updateStudentProfile(student);
}

document.getElementById("loadBtn")
  .addEventListener("click", function() {
    updateStudentProfile(student);
  });

document.getElementById("updateMarksBtn")
  .addEventListener("click", function() {
    updateMarks(95);
  });

</script>

</body>
</html>
