<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Evaluator</title>
</head>

<body>

<h2>Student Grade Evaluator</h2>

<p id="output"></p>

<script>

let marks = 68;
let grade;

if (marks >= 75){
  grade = "Grade A";
}
else if (marks >= 60){
  grade = "Grade B";
}
else if (marks >= 40){
  grade = "Grade C";
}
else{
  grade = "Fail";
}

// Display on web page
document.getElementById("output").textContent =
  "Marks: " + marks + " → " + grade;

// Also print in console
console.log("Marks:", marks);
console.log("Result:", grade);

</script>

</body>
</html>
