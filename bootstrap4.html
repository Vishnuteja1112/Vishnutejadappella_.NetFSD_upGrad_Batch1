<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar with Offcanvas -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">ShopNow</a>

    <button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="menu" class="offcanvas offcanvas-end bg-dark text-white">
      <div class="offcanvas-header">
        <h5>Menu</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
      </div>

      <div class="offcanvas-body">
        <p>Home</p>
        <p>Products</p>
        <p>Contact</p>
      </div>
    </div>
  </div>
</nav>

<!-- Hero -->
<div class="container text-center my-5">
  <h1>Big Sale 🔥</h1>
  <p>Up to 50% off on electronics</p>
</div>

<!-- Carousel -->
<div class="container mb-5">
  <div id="carousel" class="carousel slide" data-bs-ride="carousel">

    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://via.placeholder.com/900x300" class="d-block w-100">
      </div>
      <div class="carousel-item">
        <img src="https://via.placeholder.com/900x300" class="d-block w-100">
      </div>
    </div>

    <button class="carousel-control-prev" data-bs-target="#carousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" data-bs-target="#carousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>
</div>

<!-- Newsletter -->
<div class="container text-center my-5">
  <h4>Subscribe for Updates</h4>
  <input class="form-control w-50 mx-auto my-3" placeholder="Email">
  <button class="btn btn-primary">Subscribe</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
