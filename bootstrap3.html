<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">College Events</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <button class="btn btn-light ms-auto" data-bs-toggle="modal" data-bs-target="#eventModal">
        Add Event
      </button>
    </div>
  </div>
</nav>

<!-- Dashboard -->
<div class="container my-5">
  <div class="row g-4">

    <div class="col-md-6 col-lg-4">
      <div class="card p-3">
        <h5>Tech Fest</h5>
        <p>Date: March 10</p>
      </div>
    </div>

    <div class="col-md-6 col-lg-4">
      <div class="card p-3">
        <h5>Cultural Night</h5>
        <p>Date: March 15</p>
      </div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="eventModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Add New Event</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form>
          <input class="form-control mb-3" placeholder="Event Name" required>
          <input type="date" class="form-control mb-3" required>
          <button class="btn btn-primary w-100">Save Event</button>
        </form>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
