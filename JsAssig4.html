<!DOCTYPE html>
<html>
<head>
    <title>Traffic Signal Simulator</title>
</head>

<body>

<h2>Traffic Signal Simulator</h2>

<p id="result"></p>

<script>

let signal = "yellow";
let message;

switch(signal){

  case "red":
    message = "Stop";
    break;

  case "yellow":
    message = "Get Ready";
    break;

  case "green":
    message = "Go";
    break;

  default:
    message = "Invalid Signal";
}

// Display on webpage
document.getElementById("result").textContent =
  "Signal: " + signal + " → " + message;

// Also print in console
console.log("Signal:", signal);
console.log("Instruction:", message);

</script>

</body>
</html>
