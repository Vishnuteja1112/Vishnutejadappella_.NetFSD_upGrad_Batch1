<!DOCTYPE html>
<html>
<head>
  <title>Form Validation</title>
</head>
<body>

<h2>Registration Form</h2>

Name:
<input type="text" id="name" onchange="validateForm()"><br><br>

Email:
<input type="text" id="email" onchange="validateForm()"><br><br>

Age:
<input type="number" id="age" onchange="validateForm()"><br><br>

<button onclick="saveData()">Submit</button>

<p id="message" style="color:red;"></p>

<script>
  function validateForm() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let age = document.getElementById("age").value;
    let msg = "";

    if (name === "") {
      msg = "Name cannot be empty";
    } else if (!email.includes("@")) {
      msg = "Invalid email";
    } else if (age <= 18) {
      msg = "Age must be above 18";
    } else {
      msg = "All fields valid ✔";
    }

    document.getElementById("message").innerText = msg;
  }

  function saveData() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let age = document.getElementById("age").value;

    if (name && email.includes("@") && age > 18) {
      sessionStorage.setItem("userName", name);
      sessionStorage.setItem("userEmail", email);
      sessionStorage.setItem("userAge", age);
      alert("Data saved in session!");
    } else {
      alert("Fix validation errors first");
    }
  }
</script>

</body>
</html>
